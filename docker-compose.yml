version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: deligo
      POSTGRES_USER: deligo
      POSTGRES_PASSWORD: deligo_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deligo']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - '3000:3000'
    command: npm run start:dev
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: deligo
      DATABASE_PASSWORD: deligo_pass
      DATABASE_NAME: deligo
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_PRIVATE_KEY_PATH: keys/private.pem
      JWT_PUBLIC_KEY_PATH: keys/public.pem
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 30
      OTP_TTL_SECONDS: 300
      OTP_COOLDOWN_SECONDS: 60
      OTP_MAX_ATTEMPTS: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
